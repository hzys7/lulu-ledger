name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
        # 不要单独 cache gradle - 用 setup-java 自带的

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Cache Android SDK
        id: cache-android
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk
            /tmp/android-sdk
          key: android-sdk-v3-platforms-35-buildtools-35-ndk-27-cmake-3.22
          restore-keys: |
            android-sdk-v3-

      - name: Install Android cmdline-tools
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          set -e
          unset ANDROID_SDK_ROOT
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip >/dev/null
          export ANDROID_HOME="$HOME/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          curl -sSL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip"
          unzip -q cmdline-tools.zip -d /tmp/cmdline-tools-extracted
          mv /tmp/cmdline-tools-extracted/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          sdkmanager --version

      - name: Set up Android SDK env (cache hit path)
        if: steps.cache-android.outputs.cache-hit == 'true'
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept SDK licenses
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          unset ANDROID_SDK_ROOT
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --licenses 2>&1 | tail -5

      - name: Install Android SDK packages
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          unset ANDROID_SDK_ROOT
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Run Expo Prebuild
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          unset ANDROID_SDK_ROOT
          npx --no-install expo prebuild --platform android --clean --no-install

      - name: Patch build.gradle with release signing
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          unset ANDROID_SDK_ROOT
          node tools/patch-build-gradle.js

      - name: Verify signing config injected
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          unset ANDROID_SDK_ROOT
          if ! grep -q "lulu-ledger signing patch" android/app/build.gradle; then
            echo "::error::patch sentinel not found in android/app/build.gradle"
            exit 1
          fi
          if ! grep -E "^\s*signingConfig\s+signingConfigs\.release\s*$" android/app/build.gradle; then
            echo "::error::buildTypes.release is not pointing at signingConfigs.release"
            exit 1
          fi
          echo "--- patched build.gradle (signing-relevant lines) ---"
          grep -nE "signingConfig|signingConfigs|signing patch|^\s*(release|debug)\s*\{" android/app/build.gradle | head -40

      - name: Validate secrets configured
        env:
          LULU_KEYSTORE_BASE64: ${{ secrets.LULU_KEYSTORE_BASE64 }}
          LULU_KEYSTORE_PASS: ${{ secrets.LULU_KEYSTORE_PASS }}
          LULU_KEY_ALIAS: ${{ secrets.LULU_KEY_ALIAS }}
          LULU_KEY_PASS: ${{ secrets.LULU_KEY_PASS }}
        run: |
          if [ -z "$LULU_KEYSTORE_BASE64" ] || [ -z "$LULU_KEYSTORE_PASS" ] || [ -z "$LULU_KEY_ALIAS" ] || [ -z "$LULU_KEY_PASS" ]; then
            echo "::error::Missing required secrets. See KEYS_SETUP.md for setup instructions."
            echo "Required: LULU_KEYSTORE_BASE64, LULU_KEYSTORE_PASS, LULU_KEY_ALIAS, LULU_KEY_PASS"
            exit 1
          fi

      - name: Decode release keystore
        env:
          LULU_KEYSTORE_BASE64: ${{ secrets.LULU_KEYSTORE_BASE64 }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -e
          unset ANDROID_SDK_ROOT
          mkdir -p android/app/keys
          echo "$LULU_KEYSTORE_BASE64" | base64 -d > android/app/keys/lululedger-release.keystore
          echo "Keystore size: $(stat -c%s android/app/keys/lululedger-release.keystore) bytes"
          echo "Keystore SHA-256: $(sha256sum android/app/keys/lululedger-release.keystore | awk "{print \$1}")"
          echo "ANDROID_KEYSTORE_PATH=$(pwd)/android/app/keys/lululedger-release.keystore" >> $GITHUB_ENV
          ls -la android/app/keys/
          test -f android/app/keys/lululedger-release.keystore || (echo "ERROR: keystore not found"; exit 1)

      - name: Upload patched build.gradle (debug aid)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: patched-build-gradle
          path: android/app/build.gradle
          if-no-files-found: warn
          retention-days: 7

      - name: Build Release APK (arm64-v8a)
        working-directory: android
        env:
          LULU_KEYSTORE_FILE: ${{ env.ANDROID_KEYSTORE_PATH }}
          LULU_KEYSTORE_PASS: ${{ secrets.LULU_KEYSTORE_PASS }}
          LULU_KEY_ALIAS: ${{ secrets.LULU_KEY_ALIAS }}
          LULU_KEY_PASS: ${{ secrets.LULU_KEY_PASS }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          set -euo pipefail
          unset ANDROID_SDK_ROOT
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Rename APK with stable name (version only)
        working-directory: android/app/build/outputs/apk/release
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          unset ANDROID_SDK_ROOT
          PKG_VERSION=$(node -p "require('${{ github.workspace }}/app.json').expo.version")
          cd "${{ github.workspace }}/android/app/build/outputs/apk/release"
          mv app-release.apk "lulu-ledger-${PKG_VERSION}-arm64.apk"
          echo "PKG_VERSION=${PKG_VERSION}" >> $GITHUB_ENV
          ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: lulu-ledger-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PKG_VERSION }}
          name: 小璐记账 v${{ env.PKG_VERSION }}
          body: |
            最新 APK 自动构建。

            **版本**: v${{ env.PKG_VERSION }}
            **Commit**: ${{ github.sha }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
