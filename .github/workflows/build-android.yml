name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 13114758
          packages: |
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Run Expo Prebuild
        run: npx --no-install expo prebuild --platform android --clean --no-install

      - name: Patch build.gradle with release signing
        run: node tools/patch-build-gradle.js

      - name: Verify signing config injected
        run: grep -c "lulu-ledger signing patch" android/app/build.gradle

      - name: Validate secrets configured
        env:
          LULU_KEYSTORE_BASE64: ${{ secrets.LULU_KEYSTORE_BASE64 }}
          LULU_KEYSTORE_PASS: ${{ secrets.LULU_KEYSTORE_PASS }}
          LULU_KEY_ALIAS: ${{ secrets.LULU_KEY_ALIAS }}
          LULU_KEY_PASS: ${{ secrets.LULU_KEY_PASS }}
        run: |
          if [ -z "$LULU_KEYSTORE_BASE64" ] || [ -z "$LULU_KEYSTORE_PASS" ] || [ -z "$LULU_KEY_ALIAS" ] || [ -z "$LULU_KEY_PASS" ]; then
            echo '::error::Missing required secrets. See KEYS_SETUP.md for setup instructions.'
            echo 'Required: LULU_KEYSTORE_BASE64, LULU_KEYSTORE_PASS, LULU_KEY_ALIAS, LULU_KEY_PASS'
            exit 1
          fi

      - name: Decode release keystore
        env:
          LULU_KEYSTORE_BASE64: ${{ secrets.LULU_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keys
          echo "$LULU_KEYSTORE_BASE64" | base64 -d > android/app/keys/lululedger-release.keystore
          ls -la android/app/keys/

      - name: Build Release APK (arm64-v8a)
        working-directory: android
        env:
          LULU_KEYSTORE_FILE: ${{ github.workspace }}/android/app/keys/lululedger-release.keystore
          LULU_KEYSTORE_PASS: ${{ secrets.LULU_KEYSTORE_PASS }}
          LULU_KEY_ALIAS: ${{ secrets.LULU_KEY_ALIAS }}
          LULU_KEY_PASS: ${{ secrets.LULU_KEY_PASS }}
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Rename APK with version + date
        working-directory: android/app/build/outputs/apk/release
        run: |
          PKG_VERSION=$(node -p "require('./app.json').expo.version" ../../../../../)
          DATE=$(date +%Y%m%d)
          mv app-release.apk "lulu-ledger-${PKG_VERSION}-${DATE}-arm64.apk"
          ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: lulu-ledger-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Build AAB for Play Store
        working-directory: android
        env:
          LULU_KEYSTORE_FILE: ${{ github.workspace }}/android/app/keys/lululedger-release.keystore
          LULU_KEYSTORE_PASS: ${{ secrets.LULU_KEYSTORE_PASS }}
          LULU_KEY_ALIAS: ${{ secrets.LULU_KEY_ALIAS }}
          LULU_KEY_PASS: ${{ secrets.LULU_KEY_PASS }}
        run: ./gradlew bundleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Rename AAB with version + date
        working-directory: android/app/build/outputs/bundle/release
        run: |
          PKG_VERSION=$(node -p "require('./app.json').expo.version" ../../../../../)
          DATE=$(date +%Y%m%d)
          mv app-release.aab "lulu-ledger-${PKG_VERSION}-${DATE}-arm64.aab"
          ls -la

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v5
        with:
          name: lulu-ledger-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 90